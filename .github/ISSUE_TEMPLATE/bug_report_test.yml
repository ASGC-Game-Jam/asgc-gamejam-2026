name: 🐛 Bug Report
description: File a structured report to help us reproduce and fix the bug.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 
        Please provide as much clear detail as possible.

  - type: input
    id: version
    attributes:
      label: Software Version
      description: What version of the software are you using?
      placeholder: e.g., v2.4.1
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: Share clear steps on how we can encounter this bug.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs or Code Snippets
      description: Please paste any relevant error traces or terminal logs here.
      render: shell

  - type: checkboxes
    id: validation-checks
    attributes:
      label: Code of Conduct & Verification
      options:
        - label: I have searched existing issues to ensure this is not a duplicate.
          required: true
        - label: I agree to follow this project's Code of Conduct.
          required: true
