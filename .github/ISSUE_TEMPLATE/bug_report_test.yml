name: Bug Report
description: File a structured report to help us reproduce and fix issues.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 
        Please provide as much detail as possible.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: A brief description of the issue.
    validations:
      required: true

  - type: input
    id: build
    attributes:
      label: Build
    validations:
      required: false

  - type: input
    id: enviro
    attributes:
      label: Environment
    validations:
      required: false

  - type: dropdown
    id: repro-rate
    attributes:
      label: Reproduction Rate
      options:
        - 3/3
        - 2/3
        - 1/3
        - Cannot Reproduce
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to Reproduce
      description: Share clear steps on how we can encounter this bug.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - S1 - Critical
        - S2 - High
        - S3 - Medium
        - S4 - Low
    validations:
      required: false
        
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1 - Immediate
        - P2 - Next Release
        - P3 - Standard
        - P4 - Backlog
    validations:
      required: false

  - type: input
    id: feature
    attributes:
      label: Feature
    validations:
      required: false

  - type: dropdown
    id: discipline
    attributes:
      label: Discipline
      options:
        - Tech
        - Art
        - Design
        - Narrative
        - Audio
    validations:
      required: false

  - type: upload
    id: attachments
    attributes:
      label: Upload Attachments
      description: "Drag and drop any relevant screenshots, videos or log files here. 10mb limit for Media, 25mb for Text."
    validations:
      required: false
      accept: ".png,.jpg,.jpeg,.gif,.log,.txt,.zip,.mov,.mp4,.webm"       

  - type: textarea
    id: addinfo
    attributes:
      label: Additional Info
      description: Please include any additional information you may have here.
      render: shell
      required: false

  - type: checkboxes
    id: validation-checks
    attributes:
      label: Code of Conduct & Verification
      options:
        - label: I have searched existing issues to ensure this is not a duplicate.
          required: true
        - label: I agree to follow this project's Code of Conduct.
          required: true
