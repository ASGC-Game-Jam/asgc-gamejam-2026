name: Bug Report
description: File a structured report to help us reproduce and fix the bug.

body:
- type: input
  id: summary
  attributes:
    label: Summary
    placeholder: "A brief description of the bug that is occurring"
  validations:
    required: true

- type: input
  id: build
  attributes:
    label: Build
    placeholder: "What build was being tested"

- type: input
  id: environment
  attributes:
    label: Environment
    placeholder: "What environment was being used"

- type: textarea
  id: repro
  attributes:
    label: Reproduction steps
    description: "How do you trigger this bug? Please walk us through it step by step."
    value: |
      1.
      2.
      3.
      ...
    render: bash
  validations:
    required: true
